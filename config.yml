default:
  target_store: default
  seed: 1234
  graphical:
    width: 2000
    height: 1600
    units: "px"
    dpi: 300
    bg: "white"
    panel_scale: 3.2
  data_processing:
    time_step: 500
    number_of_taxa: !expr Inf
    minimal_proportion_of_pollen: 0.01
    min_n_cores: 5
    n_cores: 12
    n_interpolation_workers: 4
    min_n_samples: 1
    min_n_taxa: 5
  model_fitting:
    n_cores: 5
    n_mev: 2
    n_iter: 500
    n_sampling: 200
    n_step_size: ~
    n_early_stopping: ~
    n_samples_anova: 1000
    error_family: "binomial"
    spatial_crs: 3035
    spatial_mode: "spatial"
    use_spatial: true
    use_age_in_formula: true
project_cz_paleo:
  target_store: Data/targets/cz_paleo
  continent_id: "europe"
  vegvault_data:
    x_lim: !expr c(12, 18.9)
    y_lim: !expr c(48.5, 51.5)
    age_lim: !expr c(0, 5000)
    sel_dataset_type: !expr c("fossil_pollen_archive", "gridpoints")
    sel_abiotic_var_name: !expr c("bio1", "bio12")
  data_processing:
    taxonomic_resolution: "genus"
    min_n_samples: 5
    min_n_taxa: 4
    n_cores: 24
  model_fitting:
    n_mev: 3
    n_cores: 24
    n_iter: 500
    n_step_size: ~
    n_samples_anova: 100
    n_early_stopping: ~
    spatial_mode: "spatiotemporal"
project_traits_reference:
  target_store: Data/targets/traits_reference
  data_processing:
    ft_groups_min: 5
    ft_groups_max: 30
    ft_metric: "gower"
    ft_method: "average"
